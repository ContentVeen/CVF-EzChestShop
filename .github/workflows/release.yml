name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Detect version source and read version
        id: version
        run: |
          set -euo pipefail
          # The shared version may live in gradle.properties or a root build.gradle(.kts).
          VERSION_FILE=""
          for candidate in gradle.properties build.gradle build.gradle.kts; do
            if [ -f "$candidate" ] && grep -qE "^\s*version\s*=" "$candidate"; then
              VERSION_FILE="$candidate"
              break
            fi
          done
          if [ -z "$VERSION_FILE" ]; then
            echo "::error::Could not locate a version definition in gradle.properties / build.gradle / build.gradle.kts" >&2
            exit 1
          fi

          BASE=$(grep -E "^\s*version\s*=" "$VERSION_FILE" | head -n 1 | sed -E "s/.*=\s*['\"]?([^'\"]+)['\"]?.*/\1/")
          if [ -z "$BASE" ]; then
            echo "::error::Could not read version from $VERSION_FILE" >&2
            exit 1
          fi

          RELEASE_VERSION=${BASE%-SNAPSHOT}
          LAST=$(echo "$RELEASE_VERSION" | awk -F. '{print $NF}')
          PREFIX=$(echo "$RELEASE_VERSION" | sed -E "s/\.[^.]+$//")
          if [ "$PREFIX" = "$RELEASE_VERSION" ]; then
            NEXT_BASE=$((LAST + 1))
          else
            NEXT_BASE="${PREFIX}.$((LAST + 1))"
          fi
          NEXT_VERSION="${NEXT_BASE}-SNAPSHOT"
          TAG="v${RELEASE_VERSION}"

          # Plugin display name: prefer name from plugin.yml, fall back to repository name.
          PLUGIN_YML=$(find . -path ./.git -prune -o -path '*/src/main/resources/plugin.yml' -print | head -n 1)
          PLUGIN_NAME=""
          if [ -n "$PLUGIN_YML" ]; then
            PLUGIN_NAME=$(grep -E "^name:" "$PLUGIN_YML" | head -n 1 | sed -E "s/^name:\s*['\"]?([^'\"]+)['\"]?\s*$/\1/")
          fi
          if [ -z "$PLUGIN_NAME" ]; then
            PLUGIN_NAME="${{ github.event.repository.name }}"
          fi

          # Root project name (used to identify the shaded assembly jar deterministically).
          ROOT_NAME=""
          for sf in settings.gradle.kts settings.gradle; do
            if [ -f "$sf" ]; then
              ROOT_NAME=$(grep -E "rootProject\.name\s*=" "$sf" | head -n 1 | sed -E "s/.*=\s*['\"]([^'\"]+)['\"].*/\1/")
              [ -n "$ROOT_NAME" ] && break
            fi
          done
          if [ -z "$ROOT_NAME" ]; then
            ROOT_NAME="$PLUGIN_NAME"
          fi

          echo "version_file=$VERSION_FILE" >> "$GITHUB_OUTPUT"
          echo "current_base=$BASE" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "plugin_name=$PLUGIN_NAME" >> "$GITHUB_OUTPUT"
          echo "root_name=$ROOT_NAME" >> "$GITHUB_OUTPUT"

          echo "Version file:    $VERSION_FILE"
          echo "Current:         $BASE"
          echo "Release version: $RELEASE_VERSION"
          echo "Next snapshot:   $NEXT_VERSION"
          echo "Tag:             $TAG"
          echo "Plugin name:     $PLUGIN_NAME"
          echo "Root name:       $ROOT_NAME"

      - name: Verify tag does not already exist
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists locally. Aborting." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin. Aborting." >&2
            exit 1
          fi

      - name: Pin clean release version for build
        run: |
          set -euo pipefail
          VERSION_FILE="${{ steps.version.outputs.version_file }}"
          CURRENT="${{ steps.version.outputs.current_base }}"
          RELEASE="${{ steps.version.outputs.release_version }}"
          # Drop -SNAPSHOT before building so the root build script does not
          # rewrite the version into "<base>-dev+<count>-<sha>".
          sed -i -E "s|^(\s*version\s*=\s*['\"]?)${CURRENT}(['\"]?\s*)$|\1${RELEASE}\2|" "$VERSION_FILE"
          if ! grep -qE "^\s*version\s*=\s*['\"]?${RELEASE}['\"]?\s*$" "$VERSION_FILE"; then
            echo "::error::Failed to pin release version in $VERSION_FILE" >&2
            grep -E "^\s*version" "$VERSION_FILE" || true
            exit 1
          fi
          echo "Pinned $VERSION_FILE: $CURRENT -> $RELEASE (build only)"

      - name: Build
        run: gradle build --no-daemon --stacktrace --console=plain

      - name: Collect plugin jar
        id: collect
        run: |
          set -euo pipefail
          mkdir -p release-assets
          ROOT_NAME="${{ steps.version.outputs.root_name }}"
          RELEASE="${{ steps.version.outputs.release_version }}"

          shopt -s nullglob globstar

          # Preferred: deterministic shaded assembly jar named "<rootProject.name>-<version>.jar".
          # Produced by the shadowJar task in the assembly subproject (here: paper-plugin).
          declare -a MATCHES=()
          for jar in **/build/libs/"${ROOT_NAME}-${RELEASE}.jar"; do
            MATCHES+=("$jar")
          done

          # Fallback: any jar whose top-level contents include plugin.yml. Pick the largest
          # (the shaded jar dwarfs the unshaded library jar).
          if [ ${#MATCHES[@]} -eq 0 ]; then
            echo "No jar matched ${ROOT_NAME}-${RELEASE}.jar, falling back to plugin.yml heuristic."
            BEST=""
            BEST_SIZE=0
            for jar in **/build/libs/*.jar; do
              case "$jar" in
                *-sources.jar|*-javadoc.jar) continue ;;
              esac
              if unzip -l "$jar" 2>/dev/null | awk '{print $NF}' | grep -qx "plugin.yml"; then
                size=$(stat -c%s "$jar")
                echo "  candidate: $jar ($size bytes)"
                if [ "$size" -gt "$BEST_SIZE" ]; then
                  BEST="$jar"
                  BEST_SIZE=$size
                fi
              fi
            done
            [ -n "$BEST" ] && MATCHES=("$BEST")
          fi

          if [ ${#MATCHES[@]} -eq 0 ]; then
            echo "::error::No plugin jar produced by the build." >&2
            echo "Build output tree:" >&2
            find . -path '*/build/libs/*.jar' -not -path './.git/*' >&2 || true
            exit 1
          fi

          for jar in "${MATCHES[@]}"; do
            echo "Selected plugin jar: $jar"
            cp -v "$jar" release-assets/
          done
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.plugin_name }} ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: release-assets/*.jar

      - name: Bump version to next snapshot
        run: |
          set -euo pipefail
          VERSION_FILE="${{ steps.version.outputs.version_file }}"
          # The file currently holds the clean release version (set by the pin step).
          PINNED="${{ steps.version.outputs.release_version }}"
          NEXT="${{ steps.version.outputs.next_version }}"
          sed -i -E "s|^(\s*version\s*=\s*['\"]?)${PINNED}(['\"]?\s*)$|\1${NEXT}\2|" "$VERSION_FILE"
          if ! grep -qE "^\s*version\s*=\s*['\"]?${NEXT}['\"]?\s*$" "$VERSION_FILE"; then
            echo "::error::Failed to bump version in $VERSION_FILE" >&2
            grep -E "^\s*version" "$VERSION_FILE" || true
            exit 1
          fi
          echo "Bumped $VERSION_FILE: $PINNED -> $NEXT"

      - name: Commit and push version bump
        run: |
          set -euo pipefail
          VERSION_FILE="${{ steps.version.outputs.version_file }}"
          NEXT="${{ steps.version.outputs.next_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VERSION_FILE"
          if git diff --cached --quiet; then
            echo "No version change to commit."
            exit 0
          fi
          git commit -m "chore: bump version to ${NEXT} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
